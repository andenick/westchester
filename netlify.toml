# Netlify Configuration for Westchester County Data Platform
# Frontend deployment configuration

[build]
  # Base directory for build
  base = "Technical/src/frontend"

  # Build command
  command = "npm run build"

  # Publish directory (relative to base)
  publish = "dist"

[build.environment]
  # Node.js version
  NODE_VERSION = "18.17.0"

  # NPM version
  NPM_VERSION = "9.8.1"

# Redirect rules for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

    # CORS headers (configure if needed for API calls)
    # Access-Control-Allow-Origin = "https://your-api-domain.com"

[[headers]]
  for = "/assets/*"
  [headers.values]
    # Cache static assets for 1 year
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    # Cache JavaScript files
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    # Cache CSS files
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    # Don't cache index.html to ensure updates are immediate
    Cache-Control = "public, max-age=0, must-revalidate"

# Environment variables (set in Netlify UI or via CLI)
# VITE_API_URL - Set to your Render backend URL (e.g., https://westchester-api.onrender.com)
# VITE_APP_NAME - "Westchester County Data Platform"
# VITE_APP_VERSION - "1.0.0"

# Deploy previews configuration
[context.deploy-preview]
  command = "npm run build"

# Branch deploys (if using Git)
[context.branch-deploy]
  command = "npm run build"

# Production context
[context.production]
  command = "npm run build"

# Functions (if needed in the future)
# [functions]
#   directory = "netlify/functions"
